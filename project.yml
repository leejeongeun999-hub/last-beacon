name: LastBeacon
options:
  minimumXcodeGenVersion: 2.44.1
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: false
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_KEY_CFBundleDisplayName: Last Beacon
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.strategy-games
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
targets:
  LastBeacon:
    type: application
    platform: iOS
    sources:
      - LastBeacon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.limeunkyu.lastbeacon
        PRODUCT_NAME: LastBeacon
  LastBeaconTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - LastBeaconTests
    dependencies:
      - target: LastBeacon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.limeunkyu.lastbeacon.tests
  LastBeaconUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - LastBeaconUITests
    dependencies:
      - target: LastBeacon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.limeunkyu.lastbeacon.uitests
schemes:
  LastBeacon:
    build:
      targets:
        LastBeacon: all
        LastBeaconTests: [test]
        LastBeaconUITests: [test]
    test:
      targets:
        - LastBeaconTests
        - LastBeaconUITests

