name: LastBeacon
options:
  minimumXcodeGenVersion: 2.44.1
  deploymentTarget:
    iOS: "17.0"
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 13.4.0
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: false
    GENERATE_INFOPLIST_FILE: true
targets:
  LastBeacon:
    type: application
    platform: iOS
    sources:
      - path: LastBeacon
        excludes:
          - Resources/Info.plist
          - Resources/LastBeacon.entitlements
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.limeunkyu.lastbeacon
        PRODUCT_NAME: LastBeacon
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: BYSD998XY3
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: LastBeacon/Resources/Info.plist
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_ENTITLEMENTS: LastBeacon/Resources/LastBeacon.entitlements
      configs:
        Debug:
          GAD_APPLICATION_IDENTIFIER: ca-app-pub-3940256099942544~1458002511
        Release:
          GAD_APPLICATION_IDENTIFIER: ca-app-pub-5754584472729127~8554677780
  LastBeaconTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - LastBeaconTests
    dependencies:
      - target: LastBeacon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.limeunkyu.lastbeacon.tests
  LastBeaconUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - LastBeaconUITests
    dependencies:
      - target: LastBeacon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.limeunkyu.lastbeacon.uitests
schemes:
  LastBeacon:
    build:
      targets:
        LastBeacon: all
        LastBeaconTests: [test]
        LastBeaconUITests: [test]
    test:
      targets:
        - LastBeaconTests
        - LastBeaconUITests
